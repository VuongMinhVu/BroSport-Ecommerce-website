version: '3.8'
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: brosport-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Tắt bảo mật ở môi trường Dev
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Giới hạn RAM tránh treo máy
    ports:
      - "9200:9200"
      - "9300:9300"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: brosport-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch