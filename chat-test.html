<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>BroSport Chat Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .box {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
      width: 400px;
    }

    #messages {
      height: 200px;
      overflow-y: scroll;
      border: 1px solid #000;
      padding: 5px;
      margin-bottom: 10px;
      background: #f9f9f9;
    }
  </style>
</head>

<body>
  <h2>Kiểm thử Chat BroSport</h2>

  <div class="box">
    <b>1. Đăng nhập giả lập</b><br>
    <input type="text" id="myId" placeholder="Nhập email của bạn (VD: user1@gmail.com)" style="width: 250px;">
    <button onclick="connect()">Kết nối</button>
    <span id="status" style="color: red;">Chưa kết nối</span>
  </div>

  <div class="box">
    <b>2. Gửi tin nhắn</b><br>
    <input type="text" id="targetId" placeholder="Người nhận (Mặc định: admin@brosport.com)"
      style="width: 250px;"><br><br>
    <input type="text" id="messageContent" placeholder="Nội dung tin nhắn..." style="width: 250px;">
    <button onclick="sendMessage()">Gửi</button>
  </div>

  <div class="box">
    <b>3. Lịch sử nhận</b>
    <div id="messages"></div>
  </div>

  <script>
    var stompClient = null;

    function connect() {
      var myId = document.getElementById('myId').value;
      if (!myId) { alert("Vui lòng nhập Email của bạn"); return; }

      var socket = new SockJS('http://localhost:8080/ws');
      stompClient = Stomp.over(socket);

      stompClient.connect({}, function (frame) {
        document.getElementById('status').innerText = "Đã kết nối!";
        document.getElementById('status').style.color = "green";

        // Đăng ký nhận tin nhắn của chính mình
        stompClient.subscribe('/user/' + myId + '/queue/messages', function (msg) {
          var body = JSON.parse(msg.body);
          var chatBox = document.getElementById('messages');
          chatBox.innerHTML += `<p><b>[Nhận từ ${body.senderId}]:</b> ${body.content}</p>`;
          chatBox.scrollTop = chatBox.scrollHeight;
        });
      }, function (error) {
        alert("Lỗi kết nối: Mở file SecurityConfig.java kiểm tra đã permitAll /ws/** chưa!");
      });
    }

    function sendMessage() {
      var myId = document.getElementById('myId').value;
      var targetId = document.getElementById('targetId').value || "admin@brosport.com";
      var content = document.getElementById('messageContent').value;

      if (stompClient && content) {
        var chatMessage = {
          senderId: myId,
          recipientId: targetId,
          content: content
        };

        // Gửi lên server
        stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(chatMessage));

        // Hiển thị tin nhắn vừa gửi lên màn hình
        var chatBox = document.getElementById('messages');
        chatBox.innerHTML += `<p style="color:blue;"><b>[Bạn gửi cho ${targetId}]:</b> ${content}</p>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        document.getElementById('messageContent').value = ''; // Xóa ô nhập
      } else {
        alert("Hãy kết nối và nhập nội dung trước khi gửi!");
      }
    }
  </script>
</body>

</html>
