<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>BroSport Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="container mt-5">
        <h1 class="text-primary">Test Hệ Thống BroSport</h1>
        <hr>
        <div class="alert alert-success">
            <h3 th:text="${message}">Loading...</h3>
        </div>
        <p>Nếu bạn thấy dòng chữ trên, Thymeleaf đã hoạt động!</p>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Checklist Công Nghệ:</h5>
                <ul>
                    <li>Spring Boot: <span class="badge bg-success">OK</span></li>
                    <li>Thymeleaf: <span class="badge bg-success">OK</span></li>
                    <li>MySQL Connection: <span class="badge bg-warning text-dark">Check Log Console</span></li>
                </ul>
            </div>
        </div>
    </div>
</body>

</html>
