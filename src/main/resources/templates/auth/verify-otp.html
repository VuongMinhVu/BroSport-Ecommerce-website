<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Brosport</title>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --bg: #050505;
            --panel: #101114;
            --panel-2: #17181c;
            --border: rgba(255,255,255,0.07);
            --text: #f5f5f5;
            --muted: #9aa3af;
            --orange: #ff7a00;
            --orange-2: #ff9a2f;
            --shadow: 0 16px 50px rgba(0,0,0,0.48);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                    radial-gradient(circle at center, rgba(255,106,0,0.06), transparent 22%),
                    linear-gradient(180deg, #050505 0%, #020202 100%);
            overflow: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button, input {
            font: inherit;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            position: relative;
        }

        .bg-word {
            position: absolute;
            top: 50%;
            transform: translateY(-50%) rotate(180deg);
            writing-mode: vertical-rl;
            font-size: 72px;
            font-weight: 800;
            color: rgba(255,255,255,0.035);
            letter-spacing: 2px;
            user-select: none;
            pointer-events: none;
        }

        .bg-word.left {
            left: 28px;
        }

        .bg-word.right {
            right: 28px;
        }

        .verify-box {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 2;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .brand-badge {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            background: var(--orange);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .brand-text {
            font-size: 16px;
        }

        .brand-text span {
            color: var(--orange);
        }

        .verify-card {
            background:
                    radial-gradient(circle at top, rgba(255,122,0,0.08), transparent 30%),
                    linear-gradient(180deg, #101114 0%, #0b0c0f 100%);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 28px 26px 22px;
            text-align: center;
        }

        .verify-card h1 {
            font-size: 18px;
            letter-spacing: 1px;
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .verify-card p {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
            margin-bottom: 4px;
        }

        .masked-phone {
            color: #f2f3f5;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 22px;
        }

        .otp-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .otp-group input {
            width: 42px;
            height: 46px;
            border-radius: 8px;
            border: 1px solid #2b313b;
            background: #0d0f13;
            outline: none;
            text-align: center;
            color: #fff;
            font-size: 20px;
            font-weight: 800;
        }

        .otp-group input:focus {
            border-color: rgba(255,122,0,0.75);
            box-shadow: 0 0 0 3px rgba(255,122,0,0.08);
        }

        .resend-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .resend-box p {
            margin-bottom: 8px;
            font-size: 12px;
        }

        .resend-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--orange);
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .expire {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 999px;
            background: rgba(255,122,0,0.12);
            color: var(--orange);
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .submit-btn {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, var(--orange) 0%, var(--orange-2) 100%);
            color: #111;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(255,122,0,0.18);
            margin-bottom: 16px;
        }

        .submit-btn i {
            margin-left: 8px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #adb4c0;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .bottom-dots {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 30px;
            margin-bottom: 18px;
        }

        .bottom-dots span {
            width: 18px;
            height: 18px;
            border-radius: 2px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.04);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #6a7482;
            font-size: 8px;
        }

        .secure-note {
            text-align: center;
            font-size: 9px;
            letter-spacing: 2px;
            color: #67707e;
            text-transform: uppercase;
            line-height: 1.8;
        }

        .error-box,
        .success-box {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            text-align: left;
        }

        .error-box {
            background: rgba(239,68,68,0.10);
            border: 1px solid rgba(239,68,68,0.24);
            color: #fca5a5;
        }

        .success-box {
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.28);
            color: #86efac;
        }

        @media (max-width: 768px) {
            .bg-word {
                display: none;
            }

            .otp-group {
                gap: 8px;
            }

            .otp-group input {
                width: 40px;
                height: 44px;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="bg-word left">AUTHENTICATION</div>
    <div class="bg-word right">PERFORMANCE</div>

    <section class="verify-box">
        <div class="brand">
            <span class="brand-badge"><i class="fa-solid fa-bolt"></i></span>
            <span class="brand-text">BROS<span>PORT</span></span>
        </div>

        <div class="verify-card">
            <h1>Security Verification</h1>
            <p>Enter the 6-digit code sent to your device</p>
            <div class="masked-phone" th:text="${maskedDestination != null ? maskedDestination : '+1 (***) ***-4290'}">
                +1 (***) ***-4290
            </div>

            <form th:action="@{/forgot-password/verify-otp}" method="post">
                <input type="hidden" name="email" th:value="${email}">

                <div class="otp-group">
                    <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                </div>

                <input type="hidden" name="otp" id="otpValue">

                <div class="resend-box">
                    <p>Didn't receive the code?</p>
                    <a href="#" class="resend-link">
                        <i class="fa-solid fa-rotate-right"></i>
                        <span>Resend Code</span>
                    </a>
                    <div class="expire" id="expireTimer">Expires in 00:59</div>
                </div>

                <button type="submit" class="submit-btn">
                    VERIFY &amp; PROCEED <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <a th:href="@{/login}" class="back-link">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Back to Login</span>
            </a>
        </div>

        <div class="bottom-dots">
            <span><i class="fa-solid fa-minus"></i></span>
            <span><i class="fa-solid fa-circle"></i></span>
            <span><i class="fa-regular fa-square"></i></span>
        </div>

        <div class="secure-note">
            Securely encrypted by Brosport Shield Logic · 256-bit AES
        </div>
    </section>
</div>

<script>
    const otpInputs = document.querySelectorAll(".otp-input");
    const otpValue = document.getElementById("otpValue");

    function updateOtpHiddenValue() {
        let value = "";
        otpInputs.forEach(input => value += input.value);
        otpValue.value = value;
    }

    otpInputs.forEach((input, index) => {
        input.addEventListener("input", function () {
            this.value = this.value.replace(/[^0-9]/g, "").slice(0, 1);
            updateOtpHiddenValue();

            if (this.value && index < otpInputs.length - 1) {
                otpInputs[index + 1].focus();
            }
        });

        input.addEventListener("keydown", function (e) {
            if (e.key === "Backspace" && !this.value && index > 0) {
                otpInputs[index - 1].focus();
            }
        });

        input.addEventListener("paste", function (e) {
            const pasted = (e.clipboardData || window.clipboardData).getData("text");
            const digits = pasted.replace(/\D/g, "").slice(0, otpInputs.length);

            if (!digits) return;

            e.preventDefault();
            digits.split("").forEach((digit, i) => {
                if (otpInputs[i]) otpInputs[i].value = digit;
            });

            updateOtpHiddenValue();

            const nextIndex = Math.min(digits.length, otpInputs.length - 1);
            otpInputs[nextIndex].focus();
        });
    });

    let seconds = 59;
    const expireTimer = document.getElementById("expireTimer");

    if (expireTimer) {
        setInterval(() => {
            if (seconds <= 0) return;
            seconds--;
            const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
            const ss = String(seconds % 60).padStart(2, "0");
            expireTimer.textContent = `Expires in ${mm}:${ss}`;
        }, 1000);
    }
</script>
</body>
</html>
