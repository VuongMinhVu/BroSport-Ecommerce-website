<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Brosport</title>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --bg: #050505;
            --panel: #101114;
            --panel-2: #17181c;
            --border: rgba(255,255,255,0.07);
            --text: #f5f5f5;
            --muted: #9aa3af;
            --orange: #ff7a00;
            --orange-2: #ff9a2f;
            --shadow: 0 16px 50px rgba(0,0,0,0.48);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                    radial-gradient(circle at center, rgba(255,106,0,0.08), transparent 20%),
                    linear-gradient(180deg, #050505 0%, #020202 100%);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button, input {
            font: inherit;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .recover-card {
            width: 100%;
            max-width: 600px;
            background:
                    radial-gradient(circle at top, rgba(255,122,0,0.08), transparent 30%),
                    linear-gradient(180deg, #101114 0%, #0b0c0f 100%);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 26px 28px 18px;
            text-align: center;
        }

        .recover-icon {
            width: 44px;
            height: 44px;
            margin: 0 auto 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,122,0,0.12);
            border: 1px solid rgba(255,122,0,0.25);
            color: var(--orange);
            font-size: 16px;
        }

        .recover-head h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .recover-head p {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
            margin-bottom: 22px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 700;
            color: #d8dde5;
        }

        .input-wrap {
            height: 46px;
            border-radius: 8px;
            border: 1px solid #262931;
            background: linear-gradient(90deg, #111318 0%, #1c1d21 100%);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 12px;
            color: #8e98a7;
        }

        .input-wrap:focus-within {
            border-color: rgba(255,122,0,0.7);
            box-shadow: 0 0 0 3px rgba(255,122,0,0.08);
        }

        .input-wrap input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 14px;
        }

        .input-wrap input::placeholder {
            color: #6f7783;
        }

        .submit-btn {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, var(--orange) 0%, var(--orange-2) 100%);
            color: #fff;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(255,122,0,0.18);
            margin-top: 4px;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
        }

        .back-link {
            margin-top: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #aeb6c3;
            font-size: 13px;
        }

        .back-link:hover {
            color: var(--white);
        }

        .bottom-links {
            margin-top: 36px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .bottom-links a {
            font-size: 11px;
            color: #7e8794;
        }

        .powered {
            margin-top: 10px;
            font-size: 9px;
            letter-spacing: 2px;
            color: #586170;
            text-transform: uppercase;
        }

        .error-box,
        .success-box {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            text-align: left;
        }

        .error-box {
            background: rgba(239,68,68,0.10);
            border: 1px solid rgba(239,68,68,0.24);
            color: #fca5a5;
        }

        .success-box {
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.28);
            color: #86efac;
        }

        .error-text {
            display: block;
            margin-top: 6px;
            color: #f87171;
            font-size: 12px;
            text-align: left;
        }
    </style>
</head>
<body>
<div class="page">
    <section class="recover-card">
        <div class="recover-icon">
            <i class="fa-solid fa-rotate-left"></i>
        </div>

        <div class="recover-head">
            <h1>Recover Account</h1>
            <p>Choose your recovery method to get back into your account.</p>
        </div>

        <form th:action="@{/forgot-password}"
              th:object="${forgotPasswordRequest}"
              method="post">

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrap">
                    <i class="fa-regular fa-envelope"></i>
                    <input id="email"
                           th:field="*{email}"
                           type="email"
                           placeholder="name@example.com">
                </div>
                <small th:if="${#fields.hasErrors('email')}"
                       th:errors="*{email}"
                       class="error-text"></small>
            </div>

            <button type="submit" class="submit-btn">Send OTP</button>
        </form>

        <a th:href="@{/login}" class="back-link">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Back to Login</span>
        </a>

        <div class="bottom-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>

        <div class="powered">Powered by Brosport Performance Engine</div>
    </section>
</div>
</body>
</html>
