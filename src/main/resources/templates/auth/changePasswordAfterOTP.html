<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Reset Password - Brosport</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;family=Montserrat:wght@400;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#f48c25",
              "background-light": "#f8f7f5",
              "background-dark": "#120d08",
              charcoal: "#1e1e1e",
            },
            fontFamily: {
              display: ["Montserrat", "sans-serif"],
              lexend: ["Lexend", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      body {
        font-family: "Montserrat", sans-serif;
      }

      .input-focus:focus-within {
        box-shadow: 0 0 20px rgba(244, 140, 37, 0.3);
        border-color: #f48c25;
      }

      .glass-effect {
        background: rgba(18, 18, 18, 0.9);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(244, 140, 37, 0.15);
      }

      .neon-glow {
        text-shadow: 0 0 10px rgba(244, 140, 37, 0.6);
      }

      .btn-glow {
        box-shadow: 0 0 15px rgba(244, 140, 37, 0.4);
      }

      .btn-glow:hover {
        box-shadow: 0 0 25px rgba(244, 140, 37, 0.6);
      }

      .fade-in {
        animation: fadeIn 0.6s ease-out forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body
    class="bg-background-dark min-h-screen flex items-center justify-center font-display text-slate-100 p-4"
  >
    <div class="max-w-md w-full fade-in">
      <!-- Logo Section -->
      <div class="flex justify-center mb-8">
        <div class="flex items-center space-x-2">
          <div class="bg-primary p-1.5 rounded-lg">
            <span class="material-icons text-white text-2xl">bolt</span>
          </div>
          <span
            class="text-2xl font-black tracking-tighter uppercase italic font-lexend"
            >Bro<span class="text-primary">sport</span></span
          >
        </div>
      </div>

      <!-- Main Form Card -->
      <div
        class="bg-charcoal glass-effect rounded-xl shadow-2xl p-8 md:p-10 border-t-4 border-t-primary"
      >
        <!-- Header -->
        <div class="text-center mb-8">
          <h1 class="text-2xl font-extrabold mb-2 uppercase tracking-tight">
            Reset Password
          </h1>
          <p class="text-slate-400 text-sm">
            Set your new secure password below.
          </p>
        </div>

        <!-- Form -->
        <form
          th:action="@{/auth/changePasswordAfterOTP}"
          method="POST"
          class="space-y-6"
        >
          <!-- New Password Field -->
          <div class="space-y-2">
            <label
              for="newPassword"
              class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1"
              >New Password</label
            >
            <div
              class="relative input-focus transition-all duration-200 border-2 border-slate-800 bg-black/60 rounded-lg overflow-hidden flex items-center"
            >
              <input
                id="newPassword"
                name="newPassword"
                class="w-full bg-transparent border-none focus:ring-0 text-white px-4 py-3.5"
                placeholder="••••••••"
                type="password"
                required
              />
              <button
                class="px-4 text-slate-500 hover:text-primary transition-colors toggle-new-password"
                type="button"
              >
                <span class="material-symbols-outlined text-xl"
                  >visibility</span
                >
              </button>
            </div>
            <!-- Password Strength Meter -->
            <div class="pt-2">
              <div class="flex justify-between items-center mb-1">
                <span
                  class="text-[10px] font-bold uppercase tracking-tighter text-slate-500"
                  >Security Strength</span
                >
                <span
                  class="text-[10px] font-bold uppercase tracking-tighter text-primary"
                  id="strength-text"
                  >Weak</span
                >
              </div>
              <div
                class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden flex"
                id="strength-meter"
              >
                <div
                  class="h-full bg-red-500 w-1/3 border-r border-black/20"
                ></div>
                <div
                  class="h-full bg-slate-800 w-1/3 border-r border-black/20"
                ></div>
                <div class="h-full bg-slate-800 w-1/4"></div>
              </div>
            </div>
          </div>

          <!-- Confirm Password Field -->
          <div class="space-y-2">
            <label
              for="confirmNewPassword"
              class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1"
              >Confirm New Password</label
            >
            <div
              class="relative input-focus transition-all duration-200 border-2 border-slate-800 bg-black/60 rounded-lg overflow-hidden flex items-center"
            >
              <input
                id="confirmNewPassword"
                name="confirmNewPassword"
                class="w-full bg-transparent border-none focus:ring-0 text-white px-4 py-3.5"
                placeholder="••••••••"
                type="password"
                required
              />
              <button
                class="px-4 text-slate-500 hover:text-primary transition-colors toggle-confirm-password"
                type="button"
              >
                <span class="material-symbols-outlined text-xl"
                  >visibility</span
                >
              </button>
            </div>
          </div>

          <!-- Buttons -->
          <div class="pt-4 space-y-4">
            <button
              class="w-full bg-primary hover:bg-[#ff9f3c] text-black font-extrabold py-4 rounded-lg transition-all duration-300 btn-glow flex items-center justify-center group uppercase tracking-widest text-sm"
              type="submit"
            >
              Reset &amp; Login
              <span
                class="material-icons ml-2 text-lg group-hover:translate-x-1 transition-transform"
                >login</span
              >
            </button>
            <a
              th:href="@{/auth/login}"
              class="w-full text-slate-400 hover:text-white text-xs font-bold uppercase tracking-widest transition-colors flex items-center justify-center"
            >
              <span class="material-icons text-base mr-1">arrow_back</span>
              Back to Security
            </a>
          </div>
        </form>
      </div>

      <!-- Security Info Footer -->
      <div class="mt-12 flex flex-col items-center">
        <div
          class="flex items-center space-x-8 opacity-20 hover:opacity-40 transition-opacity"
        >
          <img
            alt="Visa logo"
            class="h-6 grayscale brightness-200"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuB0GXoP3hV0iuaHN-1JC4-hdj92B5FInT6g31ygz1uED-mtO5OwXNI9qwu_8x7z8pQvFXllOqQTYbxrVLj1rlKoXspPLg5N9j-_-rwneoDYkGgVqiO2lX9pd-bGgTTGZ4dGzMu0iMZl5fjQBu3Z7nAdtHd0Dbns2Cmzo3CINjvm5m0FcodAetMBL9PjEXhspTsreYiKLk2W31pAGf7W3Ivmn139vQknXsYFc207u-H1FpQLEAqcDVWp2wh1B6VOj8rxa9gvinGuYN0"
          />
          <img
            alt="Mastercard logo"
            class="h-8 grayscale brightness-200"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTvMjXwIrk_5a-7X0RY-HipIkRuAxjK-PEWkkv8-LHr6fgQOdwf-AZKkPZhqE_7Wnh5Anjoim6IqAHWIKcpUULXImSuyg_9zhzjR0RhXiCHLtO6atkalR2Jpme7Ny7RZ7UetSpifZSXYunyZe8cjx0ImSEFfshrbmEP4C1se-sYqZn00Bn3HSI31Fi5wMIBtpvev8-7W5gndky3HvzQi3vzLSdy4Lteh9LkiWkYZGH1tbpx3KIj9FA-L08bkk7JroOnh5g7HKwKmo"
          />
          <img
            alt="Norton secured"
            class="h-8 grayscale brightness-200"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuDdij752YfDge8jmZaFqqjzdJiv9bkUttqBv_qOeSBRtn-SkgD9tg6Q1OWG0y33fJPyGcbEK7hFYRpAOrzkWRL-iJrbYk56FVZIxrC22Hwb8bbbF2Fkeh5SvrUn2guz7loQ6CHNDmw6XtVzA78L-X6V-D2oQHlhg-eN0gbwio5ivfHL-HQStFikNrgoW84SROhwdLhOgvJfUZE1_SVtuo9457PdyI8MDsu3tNpFgbBIaxS-b1iHKhEBYur5C0YZmehboAvOOA1IpBo"
          />
        </div>
        <p
          class="mt-6 text-slate-600 text-[10px] uppercase tracking-[0.2em] text-center font-bold"
        >
          Securely encrypted by Brosport Shield Logic • 256-bit AES
        </p>
      </div>
    </div>

    <!-- Background Decoration -->
    <div
      class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden"
    >
      <div
        class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"
      ></div>
      <div
        class="absolute -bottom-24 -right-24 w-96 h-96 bg-primary/20 rounded-full blur-[120px]"
      ></div>
      <div
        class="absolute inset-0 opacity-[0.05]"
        style="
          background-image: radial-gradient(
            circle at 2px 2px,
            #f48c25 1px,
            transparent 0
          );
          background-size: 32px 32px;
        "
      ></div>
      <div
        class="absolute top-1/2 -left-16 -translate-y-1/2 rotate-90 hidden xl:block"
      >
        <span
          class="text-8xl font-black text-white/[0.02] select-none tracking-tighter italic uppercase font-lexend"
          >Security</span
        >
      </div>
      <div
        class="absolute top-1/2 -right-16 -translate-y-1/2 -rotate-90 hidden xl:block"
      >
        <span
          class="text-8xl font-black text-white/[0.02] select-none tracking-tighter italic uppercase font-lexend"
          >Performance</span
        >
      </div>
    </div>

    <!-- Password Toggle Scripts -->
    <script>
      document
        .querySelector(".toggle-new-password")
        .addEventListener("click", function (e) {
          e.preventDefault();
          const input = document.getElementById("newPassword");
          const icon = this.querySelector(".material-symbols-outlined");
          if (input.type === "password") {
            input.type = "text";
            icon.textContent = "visibility_off";
          } else {
            input.type = "password";
            icon.textContent = "visibility";
          }
        });

      document
        .querySelector(".toggle-confirm-password")
        .addEventListener("click", function (e) {
          e.preventDefault();
          const input = document.getElementById("confirmNewPassword");
          const icon = this.querySelector(".material-symbols-outlined");
          if (input.type === "password") {
            input.type = "text";
            icon.textContent = "visibility_off";
          } else {
            input.type = "password";
            icon.textContent = "visibility";
          }
        });

      // Password Strength Meter
      document
        .getElementById("newPassword")
        .addEventListener("input", function () {
          const password = this.value;
          let strength = 0;
          const strengthText = document.getElementById("strength-text");
          const strengthMeter = document.getElementById("strength-meter");

          if (password.length > 0) strength++;
          if (password.length >= 8) strength++;
          if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
          if (/\d/.test(password)) strength++;
          if (/[^a-zA-Z0-9]/.test(password)) strength++;

          const colors = [
            "bg-red-500",
            "bg-yellow-500",
            "bg-blue-500",
            "bg-green-500",
          ];
          const texts = ["Weak", "Fair", "Good", "Strong"];

          strengthMeter.className =
            "h-1.5 w-full bg-slate-800 rounded-full overflow-hidden flex";

          if (strength <= 1) {
            strengthText.textContent = "Weak";
            strengthText.className =
              "text-[10px] font-bold uppercase tracking-tighter text-red-500";
            strengthMeter.innerHTML =
              '<div class="h-full bg-red-500 w-1/3 border-r border-black/20"></div><div class="h-full bg-slate-800 w-1/3 border-r border-black/20"></div><div class="h-full bg-slate-800 w-1/4"></div>';
          } else if (strength === 2) {
            strengthText.textContent = "Fair";
            strengthText.className =
              "text-[10px] font-bold uppercase tracking-tighter text-yellow-500";
            strengthMeter.innerHTML =
              '<div class="h-full bg-yellow-500 w-1/3 border-r border-black/20"></div><div class="h-full bg-yellow-500 w-1/3 border-r border-black/20"></div><div class="h-full bg-slate-800 w-1/4"></div>';
          } else if (strength === 3) {
            strengthText.textContent = "Good";
            strengthText.className =
              "text-[10px] font-bold uppercase tracking-tighter text-blue-500";
            strengthMeter.innerHTML =
              '<div class="h-full bg-blue-500 w-1/3 border-r border-black/20"></div><div class="h-full bg-blue-500 w-1/3 border-r border-black/20"></div><div class="h-full bg-blue-500 w-1/4"></div>';
          } else {
            strengthText.textContent = "Strong";
            strengthText.className =
              "text-[10px] font-bold uppercase tracking-tighter text-primary";
            strengthMeter.innerHTML =
              '<div class="h-full bg-primary w-1/3 border-r border-black/20"></div><div class="h-full bg-primary w-1/3 border-r border-black/20"></div><div class="h-full bg-primary w-1/4"></div>';
          }
        });
    </script>
  </body>
</html>
