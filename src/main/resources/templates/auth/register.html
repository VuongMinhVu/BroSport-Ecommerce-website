<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Brosport</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#ff6600",
            "background-light": "#f8f7f5",
            "background-dark": "#000000",
            "surface-dark": "#121212",
            "border-dark": "#ffffff10",
          },
          fontFamily: { display: ["Lexend"] },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px",
          },
        },
      },
    };
  </script>

  <style type="text/tailwindcss">
    /* Root variables for consistent theming */
    :root {
      --bg: #050505;
      --panel: #111214;
      --border: #23252b;
      --border-soft: rgba(255, 255, 255, 0.06);
      --text: #f5f5f5;
      --muted: #8f949c;
      --orange: #ff6a00;
      --orange-2: #ff962d;
      --white: #ffffff;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      --radius-lg: 18px;
    }

    body {
      font-family: "Lexend", sans-serif;
      background: radial-gradient(circle at top, rgba(255, 106, 0, 0.06), transparent 20%),
                  linear-gradient(180deg, #080808 0%, #050505 100%);
      color: var(--text);
    }

    /* Custom Utilities */
    .nav-link {
      @apply text-[13px] font-black uppercase tracking-wider text-white hover:text-primary transition-colors duration-200;
    }

    .input-wrap {
      height: 46px;
      @apply border border-[#23252b] rounded-[10px] bg-[#101113] flex items-center gap-[10px] px-[14px] text-[#727885] transition-all duration-200;
    }

    .input-wrap:focus-within {
      border-color: rgba(255, 106, 0, 0.75);
      box-shadow: 0 0 0 3px rgba(255, 106, 0, 0.1);
    }

    .input-wrap input {
      @apply w-full bg-transparent border-none outline-none text-[14px] text-[#f5f5f5] focus:ring-0;
    }

    /* Password Strength UI */
    .strength-bars span.weak { background: #ef4444; }
    .strength-bars span.medium { background: #f59e0b; }
    .strength-bars span.strong { background: #ff962d; }

    .strength-text.weak { color: #f87171; }
    .strength-text.medium { color: #fbbf24; }
    .strength-text.strong { color: var(--orange-2); }

    /* Additional Styles */
    .submit-btn {
      @apply w-full h-[48px] rounded-[10px] bg-gradient-to-r from-[#f28b25] to-[#f79a2e] text-[#111] font-[800] text-[13px] mt-2 transition-transform duration-150 shadow-[0_10px_24px_rgba(242,139,37,0.18)];
    }
    .submit-btn:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
<div class="min-h-screen flex flex-col">
  <div th:replace="~{fragments/header :: site-header}"></div>

  <main class="flex-1 flex items-start justify-center py-9 px-4">
    <section class="w-full max-w-[600px] text-center">
      <div class="mb-[18px]">
        <h1 class="text-[26px] font-[800] mb-2 text-white">Join the Team</h1>
        <p class="text-[#8f949c] text-[14px]">Elevate your performance with premium gear.</p>
      </div>

      <div class="bg-gradient-to-b from-[#17181b] to-[#121315] border border-white/5 rounded-[18px] shadow-2xl p-6 text-left relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_top,rgba(255,106,0,0.06),transparent_28%)] pointer-events-none"></div>

        <div th:if="${errorMessage}" class="mb-3.5 p-3 rounded-[10px] bg-red-500/10 border border-red-500/25 text-red-300 text-[13px]" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="mb-3.5 p-3 rounded-[10px] bg-green-500/10 border border-green-500/28 text-green-300 text-[13px]" th:text="${successMessage}"></div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="relative z-10">
          <div class="mb-3.5">
            <label class="block mb-2 text-[12px] text-[#e4e6eb] font-semibold">Full Name</label>
            <div class="input-wrap">
              <i class="fa-regular fa-user"></i>
              <input id="fullName" th:field="*{fullName}" type="text" placeholder="Enter your name" />
            </div>
            <small th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="block mt-1.5 text-red-400 text-[12px]"></small>
          </div>

          <div class="mb-3.5">
            <label class="block mb-2 text-[12px] text-[#e4e6eb] font-semibold">Email Address</label>
            <div class="input-wrap">
              <i class="fa-regular fa-envelope"></i>
              <input id="email" th:field="*{email}" type="email" placeholder="athlete@brosport.com" />
            </div>
            <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="block mt-1.5 text-red-400 text-[12px]"></small>
          </div>

          <div class="mb-3.5">
            <label class="block mb-2 text-[12px] text-[#e4e6eb] font-semibold">Password</label>
            <div class="input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input id="password" th:field="*{password}" type="password" placeholder="Minimum 8 characters" />
              <i class="fa-regular fa-eye cursor-pointer text-[#7e848f] toggle-password" data-target="password"></i>
            </div>
            <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="block mt-1.5 text-red-400 text-[12px]"></small>

            <div class="mt-2.5 mb-3.5">
              <div class="grid grid-cols-3 gap-1.5 mb-1.5" id="strengthBars">
                <span class="h-[3px] rounded-full bg-[#3a3d43]"></span>
                <span class="h-[3px] rounded-full bg-[#3a3d43]"></span>
                <span class="h-[3px] rounded-full bg-[#3a3d43]"></span>
              </div>
              <div class="text-[10px] font-[700] tracking-wider text-[#ff962d]" id="strengthText">ENTER PASSWORD</div>
            </div>
          </div>

          <div class="mb-3.5">
            <label class="block mb-2 text-[12px] text-[#e4e6eb] font-semibold">Confirm Password</label>
            <div class="input-wrap">
              <i class="fa-solid fa-shield-halved"></i>
              <input id="confirmPassword" th:field="*{confirmPassword}" type="password" placeholder="Repeat password" />
              <i class="fa-regular fa-eye cursor-pointer text-[#7e848f] toggle-password" data-target="confirmPassword"></i>
            </div>
            <small th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="block mt-1.5 text-red-400 text-[12px]"></small>
            <small id="confirmPasswordHint" class="block mt-1.5 text-[12px]"></small>
          </div>

          <button type="submit" class="submit-btn">CREATE ACCOUNT</button>

          <div class="relative text-center my-[18px] text-[#6f7680] text-[10px] before:content-[''] before:absolute before:top-1/2 before:left-0 before:w-[38%] before:h-[1px] before:bg-white/5 after:content-[''] after:absolute after:top-1/2 after:right-0 after:w-[38%] after:h-[1px] after:bg-white/5">
            OR SIGN UP WITH
          </div>

          <div class="grid grid-cols-2 gap-2.5">
            <button type="button" class="h-[42px] rounded-[10px] border border-[#23252b] bg-transparent text-white cursor-pointer flex items-center justify-center gap-2.5 text-[13px] font-semibold">
              <i class="fa-brands fa-google text-[#ea4335]"></i> Google
            </button>
            <button type="button" class="h-[42px] rounded-[10px] border border-[#23252b] bg-transparent text-white cursor-pointer flex items-center justify-center gap-2.5 text-[13px] font-semibold">
              <i class="fa-brands fa-facebook-f text-[#1877f2]"></i> Facebook
            </button>
          </div>
        </form>
      </div>

      <div class="mt-[18px] text-[13px] text-[#8f949c]">
        Already have an account? <a th:href="@{/login}" class="text-[#ff962d] font-[700]">Log In</a>
      </div>

      <div class="mt-[18px] flex justify-center gap-[18px] flex-wrap">
        <a href="#" class="text-[10px] text-[#5f6670] tracking-[0.8px] hover:text-[#ff962d]">TERMS OF SERVICE</a>
        <a href="#" class="text-[10px] text-[#5f6670] tracking-[0.8px] hover:text-[#ff962d]">PRIVACY POLICY</a>
        <a href="#" class="text-[10px] text-[#5f6670] tracking-[0.8px] hover:text-[#ff962d]">COOKIES</a>
      </div>
    </section>
  </main>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const toggleIcons = document.querySelectorAll(".toggle-password");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const confirmPasswordHint = document.getElementById("confirmPasswordHint");
    const strengthBars = document.querySelectorAll("#strengthBars span");
    const strengthText = document.getElementById("strengthText");

    // Toggle Password Visibility
    toggleIcons.forEach(icon => {
      icon.addEventListener("click", function () {
        const targetId = this.getAttribute("data-target");
        const input = document.getElementById(targetId);
        if (input.type === "password") {
          input.type = "text";
          this.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          input.type = "password";
          this.classList.replace("fa-eye-slash", "fa-eye");
        }
      });
    });

    // Password Strength Logic
    function updateStrengthUI(password) {
      let score = 0;
      if (password.length >= 8) score++;
      if (/[a-zA-Z]/.test(password)) score++;
      if (/\d/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;

      // Clear previous state
      strengthBars.forEach(bar => bar.className = "h-[3px] rounded-full bg-[#3a3d43]");
      strengthText.className = "text-[10px] font-[700] tracking-wider";

      if (password.length === 0) {
        strengthText.textContent = "ENTER PASSWORD";
        return;
      }

      let result = { level: 1, text: "WEAK", class: "weak" };
      if (score >= 3) result = { level: 2, text: "MEDIUM", class: "medium" };
      if (score >= 4) result = { level: 3, text: "STRONG", class: "strong" };

      for (let i = 0; i < result.level; i++) {
        strengthBars[i].classList.add(result.class);
      }
      strengthText.textContent = result.text + " PASSWORD";
      strengthText.classList.add(result.class);
    }

    // Confirm Password Match
    function checkMatch() {
      const pass = passwordInput.value;
      const conf = confirmPasswordInput.value;
      confirmPasswordHint.className = "block mt-1.5 text-[12px]";

      if (!conf) {
        confirmPasswordHint.textContent = "";
        return;
      }

      if (pass === conf) {
        confirmPasswordHint.textContent = "Mật khẩu xác nhận khớp";
        confirmPasswordHint.classList.add("text-green-400");
      } else {
        confirmPasswordHint.textContent = "Mật khẩu xác nhận chưa khớp";
        confirmPasswordHint.classList.add("text-red-400");
      }
    }

    passwordInput.addEventListener("input", (e) => {
      updateStrengthUI(e.target.value);
      checkMatch();
    });
    confirmPasswordInput.addEventListener("input", checkMatch);
  });
</script>
</body>
</html>
