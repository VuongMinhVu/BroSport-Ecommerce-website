<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="site-header">

  <!-- CSS INLINE -->
  <style>
    .profile-btn {
      overflow: hidden;
      padding: 0;
    }

    .header-avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }
    .topbar {
      height: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      background: #0f0f0f;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: #fff;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
    }

    .logo-badge {
      width: 22px;
      height: 22px;
      background: #ff8f1f;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .logo-text {
      font-size: 14px;
      letter-spacing: 1px;
    }

    .main-nav {
      display: flex;
      gap: 18px;
    }

    .main-nav a {
      font-size: 12px;
      font-weight: 700;
      color: #d5d7db;
      transition: 0.2s;
      text-decoration: none;
    }

    .main-nav a:hover {
      color: #fff;
    }

    .main-nav .sale {
      color: #ff9b2f;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1b1f;
      border: 1px solid #242830;
      padding: 0 12px;
      border-radius: 999px;
      height: 38px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      width: 200px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      transition: 0.2s;
      text-decoration: none;
    }

    .icon-btn:hover {
      background: #1f1f1f;
    }

    .cart-btn {
      position: relative;
    }

    .dot {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #ff8f1f;
      color: #fff;
      font-size: 10px;
      font-weight: bold;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>

  <!-- HEADER -->
  <div class="topbar">

    <!-- LEFT -->
    <div class="topbar-left">
      <a th:href="@{/}" class="logo">
                <span class="logo-badge">
                    <i class="fa-solid fa-bolt"></i>
                </span>
        <span class="logo-text">BROSPORT</span>
      </a>

      <nav class="main-nav">
        <a th:href="@{/products}">NEW ARRIVALS</a>
        <a th:href="@{/products/men}">MEN</a>
        <a th:href="@{/products/women}">WOMEN</a>
        <a th:href="@{/products/kids}">KIDS</a>
        <a th:href="@{/products/accessories}">ACCESSORIES</a>
        <a th:href="@{/products/brands}">BRANDS</a>
        <a th:href="@{/products/sports}">SPORTS</a>
        <a th:href="@{/products/sales}" class="sale">SALES</a>
      </nav>
    </div>

    <!-- RIGHT -->
    <div class="topbar-right">

      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search elite gear...">
      </div>

      <script>
        document.addEventListener("DOMContentLoaded", () => {
          const searchInput = document.getElementById("global-search-input");
          const searchDropdown = document.getElementById(
            "global-search-dropdown",
          );
          const dropdownContent = document.getElementById(
            "global-dropdown-content",
          );
          const emptyState = document.getElementById("global-empty-state");
          const cartCountBadge = document.getElementById("cart-count");

          syncCartCount();

          if (!searchInput) return;

          // 1. Gợi ý từ khóa (Autocomplete)
          searchInput.addEventListener("input", async (e) => {
            const query = e.target.value.trim();
            if (query.length === 0) {
              searchDropdown.classList.add("hidden");
              return;
            }
            try {
              const res = await fetch(
                `/api/v1/search/autocomplete?keyword=${encodeURIComponent(query)}`,
              );
              const data = await res.json();
              const products = data.content || data;

              if (products && products.length > 0) {
                dropdownContent.innerHTML = products
                  .map(
                    (item) => `
                            <div class="px-4 py-3 hover:bg-white/10 cursor-pointer flex items-center gap-3 transition-colors"
                                 onclick="window.location.href='/product/${item.slug}'">
                              <div class="w-12 h-12 shrink-0 bg-white/5 rounded-md border border-[#2d2d2d] overflow-hidden flex items-center justify-center">
                                <img src="${item.thumbnail || ""}" class="w-full h-full object-cover" onerror="this.style.display='none'"/>
                              </div>
                              <div class="flex-1 text-left">
                                <h4 class="text-sm font-semibold text-white line-clamp-1">${item.name}</h4>
                                <div class="flex gap-2 items-center mt-1">
                                  ${item.showPrice ? `<span class="text-xs font-bold text-primary">${item.showPrice.toLocaleString("vi-VN")}đ</span>` : ""}
                                  ${item.originPrice && item.originPrice > item.showPrice ? `<span class="text-[10px] text-slate-500 line-through">${item.originPrice.toLocaleString("vi-VN")}đ</span>` : ""}
                                </div>
                              </div>
                            </div>
                        `,
                  )
                  .join("");
                emptyState.classList.add("hidden");
              } else {
                dropdownContent.innerHTML = "";
                emptyState.classList.remove("hidden");
              }
              searchDropdown.classList.remove("hidden");
            } catch (err) {
              console.error("Lỗi khi tìm kiếm:", err);
            }
          });

          // 2. Chuyển hướng khi bấm Enter
          searchInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              const query = e.target.value.trim();
              if (query.length > 0) {
                window.location.href = `/products?keyword=${encodeURIComponent(query)}`;
              }
            }
          });

          // 3. Ẩn dropdown khi click ra ngoài
          document.addEventListener("click", (e) => {
            if (
              !e.target.closest("#global-search-input") &&
              !e.target.closest("#global-search-dropdown")
            ) {
              searchDropdown.classList.add("hidden");
            }
          });

          // 4. Hiện dropdown khi click lại vào ô search
          searchInput.addEventListener("focus", (e) => {
            if (e.target.value.length > 0) {
              searchDropdown.classList.remove("hidden");
            }
          });

          async function syncCartCount() {
            if (!cartCountBadge) return;

            const userInputElement = document.getElementById("currentUserId");
            const userId = userInputElement
              ? parseInt(userInputElement.value, 10) || 1
              : 1;

            try {
              const response = await fetch(`/api/v1/carts/user/${userId}`);
              if (!response.ok) throw new Error("Failed to fetch cart");

              const cart = await response.json();
              const cartItems = Array.isArray(cart.cartDetails)
                ? cart.cartDetails
                : [];

              cartCountBadge.textContent = String(cartItems.length);
            } catch (error) {
              cartCountBadge.textContent = "0";
            }
          }
        });
      </script>
    </header>
  </body>
</html>
