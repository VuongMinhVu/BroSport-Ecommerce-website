<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <header
      th:fragment="site-header"
      class="sticky top-0 z-50 w-full border-b border-border-dark bg-[#121212]/90 backdrop-blur-xl"
    >
      <div
        class="mx-auto flex max-w-[1600px] items-center justify-between px-6 h-20"
      >
        <a class="flex items-center gap-2 group flex-shrink-0" th:href="@{/}">
          <div
            class="flex size-9 items-center justify-center rounded bg-primary text-white transition-transform group-hover:rotate-12"
          >
            <span class="material-symbols-outlined font-bold">bolt</span>
          </div>
          <h1
            class="text-2xl font-black tracking-tighter uppercase italic text-white"
          >
            Brosport
          </h1>
        </a>
        <nav class="hidden xl:flex items-center gap-8 h-full">
          <a class="nav-link" th:href="@{/products}">New Arrivals</a>
          <a
            class="nav-link"
            th:href="@{/products/men}"
            th:classappend="${categorySlug == 'men' ? 'text-primary' : ''}"
            >Men</a
          >
          <a
            class="nav-link"
            th:href="@{/products/women}"
            th:classappend="${categorySlug == 'women' ? 'text-primary' : ''}"
            >Women</a
          >
          <a
            class="nav-link"
            th:href="@{/products/kids}"
            th:classappend="${categorySlug == 'kids' ? 'text-primary' : ''}"
            >Kids</a
          >
          <a
            class="nav-link"
            th:href="@{/products/accessories}"
            th:classappend="${categorySlug == 'accessories' ? 'text-primary' : ''}"
            >Accessories</a
          >
          <a
            class="nav-link"
            th:href="@{/products/brands}"
            th:classappend="${categorySlug == 'brands' ? 'text-primary' : ''}"
            >Brands</a
          >
          <a
            class="nav-link"
            th:href="@{/products/sports}"
            th:classappend="${categorySlug == 'sports' ? 'text-primary' : ''}"
            >Sports</a
          >
          <a
            class="text-[13px] font-black uppercase tracking-wider text-primary hover:brightness-125 transition-all"
            th:href="@{/products/sales}"
            th:classappend="${categorySlug == 'sales' ? 'brightness-125' : ''}"
            >Sales</a
          >
        </nav>

        <div class="flex items-center gap-4">
          <div class="relative hidden lg:block group">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl group-focus-within:text-primary transition-colors"
              >search</span
            >
            <input
              id="global-search-input"
              autocomplete="off"
              class="h-11 w-64 rounded-full border-none bg-black pl-10 pr-4 text-sm text-white placeholder:text-slate-500 focus:ring-1 focus:ring-primary focus:w-80 transition-all"
              placeholder="Search elite gear..."
              type="text"
            />

            <div
              id="global-search-dropdown"
              class="absolute top-full left-0 mt-2 w-80 bg-[#1a1a1a] border border-border-dark rounded-xl shadow-2xl shadow-primary/20 hidden z-50 max-h-96 overflow-y-auto"
            >
              <div id="global-dropdown-content" class="py-2"></div>
              <div
                id="global-empty-state"
                class="px-4 py-8 text-center text-slate-400"
              >
                <span class="material-symbols-outlined text-3xl block mb-2"
                  >search</span
                >
                <p class="text-sm">Enter a product name to search...</p>
              </div>
            </div>
          </div>

          <div class="flex items-center gap-2">
            <a
              th:href="@{/account/profile/edit}"
              class="overflow-hidden flex h-11 w-11 items-center justify-center rounded-full hover:bg-white/10 border-2 border-transparent hover:border-primary transition-all text-white"
            >
              <div
                class="h-full w-full bg-cover bg-center"
                th:style="'background-image: url(' + ${user?.avatarUrl} + ')'"
                th:if="${user != null and user.avatarUrl != null}"
              ></div>
              <span
                th:unless="${user != null and user.avatarUrl != null}"
                class="material-symbols-outlined text-2xl"
                >person</span
              >
            </a>
            <a
              th:href="@{/cart}"
              class="relative flex h-11 w-11 items-center justify-center rounded-full hover:bg-white/10 text-white transition-colors"
            >
              <span class="material-symbols-outlined text-2xl"
                >shopping_cart</span
              >
              <span
                id="cart-count"
                class="absolute top-1 right-1 flex h-4 w-4 items-center justify-center rounded-full bg-primary text-[10px] font-bold text-white shadow-lg"
                th:text="${cartItems != null ? #lists.size(cartItems) : 0}"
                >0</span
              >
            </a>
          </div>
        </div>
      </div>

      <script>
        document.addEventListener("DOMContentLoaded", () => {
          const searchInput = document.getElementById("global-search-input");
          const searchDropdown = document.getElementById(
            "global-search-dropdown",
          );
          const dropdownContent = document.getElementById(
            "global-dropdown-content",
          );
          const emptyState = document.getElementById("global-empty-state");

          if (!searchInput) return;

          // 1. Gợi ý từ khóa (Autocomplete)
          searchInput.addEventListener("input", async (e) => {
            const query = e.target.value.trim();
            if (query.length === 0) {
              searchDropdown.classList.add("hidden");
              return;
            }
            try {
              const res = await fetch(
                `/api/v1/search/autocomplete?keyword=${encodeURIComponent(query)}`,
              );
              const data = await res.json();
              const products = data.content || data;

              if (products && products.length > 0) {
                dropdownContent.innerHTML = products
                  .map(
                    (item) => `
                            <div class="px-4 py-3 hover:bg-white/10 cursor-pointer flex items-center gap-3 transition-colors"
                                 onclick="window.location.href='/product/${item.slug}'">
                              <div class="w-12 h-12 shrink-0 bg-white/5 rounded-md border border-[#2d2d2d] overflow-hidden flex items-center justify-center">
                                <img src="${item.thumbnail || ""}" class="w-full h-full object-cover" onerror="this.style.display='none'"/>
                              </div>
                              <div class="flex-1 text-left">
                                <h4 class="text-sm font-semibold text-white line-clamp-1">${item.name}</h4>
                                <div class="flex gap-2 items-center mt-1">
                                  ${item.showPrice ? `<span class="text-xs font-bold text-primary">${item.showPrice.toLocaleString("vi-VN")}đ</span>` : ""}
                                  ${item.originPrice && item.originPrice > item.showPrice ? `<span class="text-[10px] text-slate-500 line-through">${item.originPrice.toLocaleString("vi-VN")}đ</span>` : ""}
                                </div>
                              </div>
                            </div>
                        `,
                  )
                  .join("");
                emptyState.classList.add("hidden");
              } else {
                dropdownContent.innerHTML = "";
                emptyState.classList.remove("hidden");
              }
              searchDropdown.classList.remove("hidden");
            } catch (err) {
              console.error("Lỗi khi tìm kiếm:", err);
            }
          });

          // 2. Chuyển hướng khi bấm Enter
          searchInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              const query = e.target.value.trim();
              if (query.length > 0) {
                window.location.href = `/products?keyword=${encodeURIComponent(query)}`;
              }
            }
          });

          // 3. Ẩn dropdown khi click ra ngoài
          document.addEventListener("click", (e) => {
            if (
              !e.target.closest("#global-search-input") &&
              !e.target.closest("#global-search-dropdown")
            ) {
              searchDropdown.classList.add("hidden");
            }
          });

          // 4. Hiện dropdown khi click lại vào ô search
          searchInput.addEventListener("focus", (e) => {
            if (e.target.value.length > 0) {
              searchDropdown.classList.remove("hidden");
            }
          });
        });
      </script>
    </header>
  </body>
</html>
