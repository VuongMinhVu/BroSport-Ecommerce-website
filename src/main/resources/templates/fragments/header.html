<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="site-header">

  <!-- CSS INLINE -->
  <style>
    .profile-btn {
      overflow: hidden;
      padding: 0;
    }

    .header-avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }
    .topbar {
      height: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      background: #0f0f0f;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: #fff;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
    }

    .logo-badge {
      width: 22px;
      height: 22px;
      background: #ff8f1f;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .logo-text {
      font-size: 14px;
      letter-spacing: 1px;
    }

    .main-nav {
      display: flex;
      gap: 18px;
    }

    .main-nav a {
      font-size: 12px;
      font-weight: 700;
      color: #d5d7db;
      transition: 0.2s;
      text-decoration: none;
    }

    .main-nav a:hover {
      color: #fff;
    }

    .main-nav .sale {
      color: #ff9b2f;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1b1f;
      border: 1px solid #242830;
      padding: 0 12px;
      border-radius: 999px;
      height: 38px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      width: 200px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      transition: 0.2s;
      text-decoration: none;
    }

    .icon-btn:hover {
      background: #1f1f1f;
    }

    .cart-btn {
      position: relative;
    }

    .dot {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #ff8f1f;
      color: #fff;
      font-size: 10px;
      font-weight: bold;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>

  <!-- HEADER -->
  <div class="topbar">

    <!-- LEFT -->
    <div class="topbar-left">
      <a th:href="@{/}" class="logo">
                <span class="logo-badge">
                    <i class="fa-solid fa-bolt"></i>
                </span>
        <span class="logo-text">BROSPORT</span>
      </a>

      <nav class="main-nav">
        <a th:href="@{/products}">NEW ARRIVALS</a>
        <a th:href="@{/products/men}">MEN</a>
        <a th:href="@{/products/women}">WOMEN</a>
        <a th:href="@{/products/kids}">KIDS</a>
        <a th:href="@{/products/accessories}">ACCESSORIES</a>
        <a th:href="@{/products/brands}">BRANDS</a>
        <a th:href="@{/products/sports}">SPORTS</a>
        <a th:href="@{/products/sales}" class="sale">SALES</a>
      </nav>
    </div>

    <!-- RIGHT -->
    <div class="topbar-right">

      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search elite gear...">
      </div>

      <a th:href="@{/account/profile/edit}" class="icon-btn profile-btn">
        <img th:if="${currentUser != null and currentUser.avatarUrl != null and !#strings.isEmpty(currentUser.avatarUrl)}"
             th:src="${currentUser.avatarUrl}"
             alt="Avatar"
             class="header-avatar">

        <i th:unless="${currentUser != null and currentUser.avatarUrl != null and !#strings.isEmpty(currentUser.avatarUrl)}"
           class="fa-regular fa-user"></i>
      </a>

      <a th:href="@{/cart}" class="icon-btn cart-btn">
        <i class="fa-solid fa-bag-shopping"></i>
        <span class="dot"
              th:text="${cartItems != null ? #lists.size(cartItems) : 0}">
                    0
                </span>
      </a>

    </div>
  </div>

</header>

</body>
</html>
