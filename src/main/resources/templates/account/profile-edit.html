<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile - Brosport</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#ff6600",
              "background-light": "#f8f7f5",
              "background-dark": "#000000",
              "surface-dark": "#121212",
              "border-dark": "#ffffff10",
            },
            fontFamily: { display: ["Lexend"] },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      body {
        font-family: "Lexend", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .filled {
        font-variation-settings: "FILL" 1;
      }
      #chat-toggle:checked ~ #chat-window {
        display: flex;
      }
      #chat-toggle:checked ~ #chat-trigger .open-icon {
        display: none;
      }
      #chat-toggle:checked ~ #chat-trigger .close-icon {
        display: block;
      }
      .close-icon {
        display: none;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .nav-link {
        @apply text-[13px] font-black uppercase tracking-wider text-white hover:text-primary transition-colors duration-200;
      }
    </style>
  </head>
  <body class="font-display bg-[#050505] text-[#f5f5f5]">
    <div class="min-h-screen bg-gradient-to-b from-[#090909] to-[#050505]">
      <div th:replace="~{fragments/header :: site-header}"></div>

      <main
        class="max-w-[1280px] mx-auto px-4 sm:px-6 py-9 sm:py-14 grid grid-cols-1 lg:grid-cols-[250px_1fr] gap-7"
      >
        <div
          th:replace="~{fragments/sidebar :: user-sidebar(activePage='profile')}"
        ></div>

        <section>
          <div class="mb-7">
            <h1 class="text-[28px] md:text-[38px] font-extrabold mb-2.5">
              Edit Profile
            </h1>
            <p class="max-w-[520px] text-[#8f949c] text-[14px] leading-relaxed">
              Update your personal information to experience the best service.
            </p>
          </div>

          <div
            th:if="${successMessage}"
            class="mb-4 p-4 rounded-lg bg-[#ff6a001f] border border-[#ff6a0038] text-[#ff8a1d] text-sm flex items-center gap-2"
          >
            <i class="fa-solid fa-circle-check"></i
            ><span th:text="${successMessage}"></span>
          </div>

          <div
            class="bg-gradient-to-b from-[#141518] to-[#111214] border border-[#202229] rounded-[18px] overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.35)]"
          >
            <form
              th:action="@{/profile/edit}"
              method="post"
              th:object="${profileForm}"
              enctype="multipart/form-data"
            >
              <div
                class="min-h-[220px] border-b border-white/5 flex flex-col items-center justify-center text-center p-7"
              >
                <div class="relative mb-3.5 group">
                  <div
                    class="w-[94px] h-[94px] rounded-full p-1 bg-gradient-to-br from-[#7f5f46] to-[#e7d4c1]"
                  >
                    <img
                      id="avatar-preview"
                      th:src="${(user?.avatarUrl != null and !user.avatarUrl.isEmpty()) ? user.avatarUrl : 'https://cdn-icons-png.flaticon.com/512/3177/3177440.png'}"
                      class="w-full h-full object-cover rounded-full bg-[#d9dadb] block"
                    />
                  </div>
                  <label
                    for="avatar-upload"
                    class="absolute -right-0.5 bottom-1 w-[26px] h-[26px] rounded-full bg-primary text-white border-2 border-[#17181b] flex items-center justify-center cursor-pointer text-[11px] hover:scale-110 transition-transform"
                  >
                    <i class="fa-solid fa-camera"></i>
                  </label>
                  <input
                    type="file"
                    id="avatar-upload"
                    name="avatarFile"
                    accept="image/*"
                    class="hidden"
                  />
                </div>
                <h2
                  class="text-[20px] mb-1.5 font-semibold"
                  th:text="${user?.fullName}"
                ></h2>
                <p
                  class="text-[#8f949c] text-[13px]"
                  th:text="${user?.email}"
                ></p>
              </div>

              <div class="p-4 sm:p-5">
                <div
                  class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5 mb-4"
                >
                  <div>
                    <label
                      class="inline-block mb-2 text-[11px] font-bold text-[#7e848e] tracking-widest uppercase"
                      >Full Name</label
                    >
                    <div
                      class="h-12 border border-[#23252b] rounded-[10px] bg-[#090909] flex items-center gap-2.5 px-3.5 text-[#7f8691] focus-within:border-primary transition-colors"
                    >
                      <i class="fa-regular fa-user"></i>
                      <input
                        th:field="*{fullName}"
                        type="text"
                        placeholder="Nhập họ tên"
                        class="w-full bg-transparent border-none outline-none text-[#f5f5f5] text-[14px] focus:ring-0 p-0"
                      />
                    </div>
                    <p
                      th:if="${#fields.hasErrors('fullName')}"
                      th:errors="*{fullName}"
                      class="text-red-500 text-xs mt-1"
                    ></p>
                  </div>

                  <div>
                    <label
                      class="inline-block mb-2 text-[11px] font-bold text-[#7e848e] tracking-widest uppercase"
                      >Phone Number</label
                    >
                    <div
                      class="h-12 border border-[#23252b] rounded-[10px] bg-[#090909] flex items-center gap-2.5 px-3.5 text-[#7f8691] focus-within:border-primary transition-colors"
                    >
                      <i class="fa-solid fa-phone"></i>
                      <input
                        th:field="*{phone}"
                        type="text"
                        placeholder="Nhập số điện thoại"
                        class="w-full bg-transparent border-none outline-none text-[#f5f5f5] text-[14px] focus:ring-0 p-0"
                      />
                    </div>
                    <p
                      th:if="${#fields.hasErrors('phone')}"
                      th:errors="*{phone}"
                      class="text-red-500 text-xs mt-1"
                    ></p>
                  </div>
                </div>

                <div class="mb-4">
                  <label
                    class="inline-block mb-2 text-[11px] font-bold text-[#7e848e] tracking-widest uppercase"
                    >Address</label
                  >
                  <div
                    class="border border-[#23252b] rounded-[10px] bg-[#090909] flex items-start gap-2.5 px-3.5 pt-3.5 pb-2 text-[#7f8691] focus-within:border-primary transition-colors"
                  >
                    <i class="fa-solid fa-location-dot mt-1"></i>
                    <textarea
                      th:field="*{address}"
                      rows="3"
                      placeholder="Enter your address..."
                      class="w-full bg-transparent border-none outline-none text-[#f5f5f5] text-[14px] focus:ring-0 p-0 resize-y min-h-[50px]"
                    ></textarea>
                  </div>
                  <p
                    th:if="${#fields.hasErrors('address')}"
                    th:errors="*{address}"
                    class="text-red-500 text-xs mt-1"
                  ></p>
                </div>

                <input type="hidden" th:field="*{avatarUrl}" />

                <div class="flex justify-end gap-3 mt-6">
                  <a
                    th:href="@{/}"
                    class="flex items-center justify-center h-[42px] px-4 rounded-[10px] font-bold text-[13px] bg-transparent text-[#c0c4ca] hover:text-white transition-colors"
                    >Cancel</a
                  >
                  <button
                    type="submit"
                    class="h-[42px] px-4 rounded-[10px] font-bold text-[13px] bg-gradient-to-r from-[#ff6600] to-[#ff8a1d] text-white inline-flex items-center gap-2 hover:opacity-90 transition-opacity"
                  >
                    <i class="fa-regular fa-floppy-disk"></i> Save
                  </button>
                </div>
              </div>
            </form>
          </div>
        </section>
      </main>

      <div th:replace="~{fragments/footer :: site-footer}"></div>
    </div>

    <script>
      function toggleEditMode(event) {
        event.preventDefault();

        const form = document.getElementById("profileForm");
        const inputs = form.querySelectorAll("input, textarea");
        const btnIcon = document.getElementById("btnIcon");
        const btnText = document.getElementById("btnText");
        const inputWraps = document.querySelectorAll(".input-wrap");

        // BƯỚC 1: Nếu đang ở chế độ xem -> Mở khóa ô nhập liệu
        if (btnText.textContent === "Edit Profile") {
          inputs.forEach((input) => {
            input.removeAttribute("readonly");
          });
          inputWraps.forEach((wrap) => {
            wrap.classList.add("editable");
          });

          // Đổi giao diện nút thành Save Changes
          btnText.textContent = "Save Changes";
          btnIcon.className = "fa-regular fa-floppy-disk";

          // Tự động focus con trỏ vào ô đầu tiên
          inputs[0].focus();
        }
        // BƯỚC 2: Nếu đã ở chế độ sửa -> Gửi form lên Backend
        else {
          form.submit();
        }
      }
      document
        .getElementById("avatar-upload")
        .addEventListener("change", function (event) {
          const file = event.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
              // Thay đổi src của thẻ img để hiển thị ảnh vừa chọn
              document.getElementById("avatar-preview").src = e.target.result;
            };
            reader.readAsDataURL(file);
          }
        });
    </script>
  </body>
</html>
