<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Compare Products - Brosport</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f96706",
                        "background-dark": "#0a0a0a",
                        "surface-dark": "#1a1a1a",
                        "border-dark": "#2a2a2a",
                    },
                    fontFamily: { "display": ["Lexend"] },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-background-dark text-white font-display; }
        }
        .comparison-table th, .comparison-table td { @apply border-b border-border-dark px-6 py-4; }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Đảm bảo icon không bị hiện chữ tên icon khi đang load */
        .material-symbols-outlined {
            @apply select-none;
            display: inline-block;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">

    <div th:replace="~{fragments/header :: site-header}"></div>

    <main class="flex-1 px-4 lg:px-20 py-12">
        <div class="flex flex-col md:flex-row justify-between items-start mb-12">
            <div>
                <h1 class="text-4xl font-bold text-white mb-4">Compare Items</h1>
                <div class="flex flex-col gap-2">
                    <a class="text-primary hover:underline text-sm flex items-center gap-2 w-fit" th:href="@{/products}">
                        <span class="material-symbols-outlined text-base notranslate">arrow_back</span>
                        <span>Back to shopping</span>
                    </a>
                    <button class="text-slate-500 hover:text-red-500 text-sm flex items-center gap-2 transition-colors w-fit" onclick="clearAllComparison()">
                        <span class="material-symbols-outlined text-base notranslate">delete_sweep</span>
                        <span>Remove all items</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse comparison-table" th:if="${not #lists.isEmpty(compareList)}">
                <thead>
                <tr class="align-top">
                    <th class="w-64 text-slate-500 uppercase text-xs tracking-widest">Product Info</th>
                    <th th:each="product : ${compareList}" class="min-w-[280px]">
                        <div class="flex flex-col gap-4">
                            <div class="aspect-square bg-surface-dark rounded-xl flex items-center justify-center overflow-hidden p-4 relative group">
                                <img th:src="${not #lists.isEmpty(product.productImages) ? product.productImages[0].imageUrl : '/images/default.jpg'}"
                                     th:alt="${product.name}" class="max-w-full h-auto object-contain transition-transform group-hover:scale-105"/>
                            </div>
                            <div class="space-y-2">
                                <h3 class="font-bold text-lg leading-tight h-14 line-clamp-2" th:text="${product.name}">Product Name</h3>
                                <div class="flex items-baseline gap-2">
                                    <span class="text-primary text-xl font-bold" th:text="${#numbers.formatCurrency(product.showPrice)}">$0.00</span>
                                    <span class="text-slate-500 line-through text-sm" th:text="${#numbers.formatCurrency(product.originPrice)}">$0.00</span>
                                </div>
                            </div>
                            <a th:href="@{'/product/' + ${product.slug}}" class="w-full bg-primary hover:bg-orange-600 text-white text-center font-bold py-3 rounded-lg uppercase tracking-wider text-sm transition-colors block">
                                View Details
                            </a>
                            <button th:onclick="'removeItem(' + ${product.id} + ')'"
                                    class="w-full border border-border-dark hover:bg-red-500/10 hover:text-red-500 text-slate-400 py-2 rounded-lg text-sm transition-all">
                                Remove
                            </button>
                        </div>
                    </th>
                </tr>
                </thead>
                <tbody class="text-sm">
                <tr>
                    <td class="font-bold text-slate-400">Brand</td>
                    <td th:each="product : ${compareList}" th:text="${product.brand}">Brand</td>
                </tr>
                <tr>
                    <td class="font-bold text-slate-400">Category</td>
                    <td th:each="product : ${compareList}" th:text="${product.category}">Category</td>
                </tr>
                <tr>
                    <td class="font-bold text-slate-400">Gender</td>
                    <td th:each="product : ${compareList}" th:text="${product.gender}">Gender</td>
                </tr>
                <tr>
                    <td class="font-bold text-slate-400">Sport</td>
                    <td th:each="product : ${compareList}" th:text="${product.sport}">Sport</td>
                </tr>
                <tr>
                    <td class="font-bold text-slate-400">Key Features</td>
                    <td th:each="product : ${compareList}" th:text="${product.feature}">Feature Info</td>
                </tr>
                <tr>
                    <td class="font-bold text-slate-400">Description</td>
                    <td th:each="product : ${compareList}">
                        <div class="line-clamp-3 text-slate-400" th:text="${product.description}">Description</div>
                    </td>
                </tr>
                <tr>
                    <td class="font-bold text-slate-400">Availability</td>
                    <td th:each="product : ${compareList}">
                        <span th:class="${product.status == 'AVAILABLE' ? 'text-green-500' : 'text-red-500'}"
                              th:text="${product.status}">Status</span>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(compareList)}" class="text-center py-20 bg-surface-dark rounded-2xl border border-dashed border-border-dark">
                <span class="material-symbols-outlined text-slate-600 mb-4 notranslate" style="font-size:64px;display:block">compare_arrows</span>
                <p class="text-slate-400">No items selected for comparison.</p>
                <a th:href="@{/products}" class="text-primary font-bold hover:underline mt-4 inline-block">Discover elite gear</a>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: site-footer}"></div>
</div>

<script th:inline="javascript">
    /**
     * Loại bỏ một sản phẩm khỏi danh sách so sánh
     * Cập nhật URL tham số 'ids' và nạp lại trang để gọi API Controller
     */
    function removeItem(productId) {
        const urlParams = new URLSearchParams(window.location.search);
        let idsString = urlParams.get('ids');
        if (!idsString) return;

        // Lọc bỏ ID vừa chọn xóa
        let ids = idsString.split(',').filter(id => id.trim() !== productId.toString());

        if (ids.length > 0) {
            // Cập nhật lại tham số ids trên URL và nhảy trang (Lúc này Network sẽ hiện request lên /product-comparison/details?ids=...)
            window.location.href = window.location.pathname + "?ids=" + ids.join(',');
        } else {
            // Nếu không còn ID nào thì quay về trang so sánh trống
            window.location.href = window.location.pathname;
        }
    }

    /**
     * Xóa sạch toàn bộ danh sách so sánh
     */
    function clearAllComparison() {
        if (confirm('Are you sure you want to remove all items from comparison?')) {
            // Chuyển hướng về trang gốc không kèm tham số ids
            window.location.href = window.location.pathname;
        }
    }
</script>
</body>
</html>
