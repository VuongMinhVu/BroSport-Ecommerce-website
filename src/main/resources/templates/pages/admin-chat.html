<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Chat Inbox - Quản Trị BroSport</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#ff6600",
                        "background-light": "#f8f7f5",
                        "background-dark": "#000000",
                        "surface-dark": "#121212",
                        "border-dark": "#ffffff10",
                    },
                    fontFamily: { display: ["Lexend"] }
                }
            }
        };
    </script>

    <style type="text/tailwindcss">
        body {
            font-family: "Lexend", sans-serif;
            @apply bg-background-dark text-white min-h-screen flex flex-col;
        }
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        }

        /* Layout & Scrollbars */
        .admin-chat-layout {
            height: calc(100vh - 140px);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff6600;
        }

        /* Sidebar Items */
        .conv-item {
            @apply p-4 border-b border-border-dark cursor-pointer transition-all border-l-4 border-transparent flex flex-col gap-1;
        }
        .conv-item:hover {
            @apply bg-white/5;
        }
        .conv-item.active {
            @apply bg-primary/10 border-primary;
        }
        .conv-item.active .text-muted {
            @apply text-white/90 font-medium;
        }
        .conv-item strong {
            @apply text-sm text-white font-bold truncate;
        }
        .text-muted {
            @apply text-[12px] text-slate-500 truncate transition-colors duration-200;
        }

        /* Badges */
        .unread-badge {
            @apply bg-primary text-white rounded-full px-2 py-0.5 text-[10px] font-black tracking-widest shadow-[0_0_10px_rgba(255,102,0,0.5)];
        }

        /* Chat Bubbles */
        .msg-bubble {
            @apply px-4 py-3 rounded-2xl max-w-[75%] text-sm leading-relaxed shadow-sm;
        }
        .msg-client {
            @apply bg-surface-dark text-slate-200 self-start rounded-tl-sm border border-border-dark;
        }
        .msg-admin {
            @apply bg-primary text-white self-end rounded-tr-sm shadow-[0_4px_15px_rgba(255,102,0,0.25)];
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: site-header}"></div>

<main class="flex-1 py-8 px-4 lg:px-8">
    <div class="admin-chat-layout container mx-auto flex max-w-[1400px] border border-border-dark rounded-2xl overflow-hidden bg-[#0a0a0a] shadow-2xl">

        <div class="w-[320px] lg:w-[380px] bg-[#050505] border-r border-border-dark flex flex-col flex-shrink-0">
            <div class="p-5 bg-black border-b border-border-dark flex items-center gap-3">
                <span class="material-symbols-outlined text-primary text-2xl">admin_panel_settings</span>
                <div>
                    <h2 class="text-white font-black uppercase tracking-widest text-sm">Inbox Quản Trị</h2>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">BroSport Support Center</p>
                </div>
            </div>
            <div id="conversationList" class="flex-1 overflow-y-auto">
                <div class="p-8 text-center text-sm text-slate-500 flex flex-col items-center gap-2">
                    <span class="material-symbols-outlined animate-spin text-primary">sync</span>
                    Đang tải danh sách...
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-surface-dark items-center justify-center" id="chatMainPlaceholder">
            <div class="size-20 rounded-full bg-black/50 flex items-center justify-center border border-border-dark mb-4">
                <span class="material-symbols-outlined text-4xl text-slate-600">forum</span>
            </div>
            <h3 class="text-lg font-black text-white uppercase tracking-wider">Hỗ trợ trực tuyến</h3>
            <p class="text-sm text-slate-500 mt-2">Chọn một cuộc hội thoại từ danh sách để bắt đầu</p>
        </div>

        <div class="flex-1 flex flex-col bg-[#080808] hidden" id="chatMainBox">
            <div class="p-5 border-b border-border-dark flex items-center gap-4 bg-black">
                <div class="size-10 rounded-full bg-surface-dark flex items-center justify-center border border-border-dark">
                    <span class="material-symbols-outlined text-slate-400">person</span>
                </div>
                <div>
                    <div class="text-white font-bold text-sm" id="activeChatHeader">Đang hỗ trợ: ...</div>
                    <div class="text-[10px] text-primary font-black tracking-widest uppercase flex items-center gap-1 mt-0.5">
                        <span class="size-1.5 bg-primary rounded-full animate-pulse"></span>
                        Live Support
                    </div>
                </div>
            </div>

            <div class="flex-1 p-6 overflow-y-auto flex flex-col gap-4" id="adminMessagesArea">
            </div>

            <div class="p-5 bg-black border-t border-border-dark flex gap-3 items-center">
                <input type="text" id="adminInputBox"
                       class="flex-1 bg-surface-dark border border-border-dark rounded-full px-6 py-3.5 text-sm text-white placeholder-slate-500 focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none"
                       placeholder="Nhập tin nhắn phản hồi..." onkeypress="handleAdminEnter(event)">

                <button onclick="sendAdminMessage()"
                        class="size-12 rounded-full bg-primary text-white flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,102,0,0.3)]">
                    <span class="material-symbols-outlined ml-1">send</span>
                </button>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: site-footer}"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script th:inline="javascript">
    var adminEmail = /*[[${#authentication.name}]]*/ 'admin@brosport.com';
    var stompClientAdmin = null;
    var activeChatEmail = null;
    var activeConvId = null;

    document.addEventListener('DOMContentLoaded', function() {
        loadConversations();
        initAdminWebSocket();
    });

    function loadConversations() {
        fetch('/api/chat/conversations')
            .then(res => res.json())
            .then(list => {
                var listDiv = document.getElementById('conversationList');
                listDiv.innerHTML = '';
                if(list.length === 0) {
                    listDiv.innerHTML = `
                            <div class="p-8 text-center flex flex-col items-center gap-3 opacity-50">
                                <span class="material-symbols-outlined text-4xl">inbox</span>
                                <p class="text-sm font-bold uppercase tracking-widest text-slate-400">Hộp thư trống</p>
                            </div>`;
                    return;
                }
                list.forEach(conv => {
                    var div = document.createElement('div');
                    div.className = 'conv-item' + (activeConvId === conv.id ? ' active' : '');
                    div.onclick = () => openConversation(conv);

                    var badge = conv.unreadCount > 0 ? `<span class="unread-badge" id="badge-${conv.id}">${conv.unreadCount}</span>` : `<span class="unread-badge" id="badge-${conv.id}" style="display:none">0</span>`;

                    div.innerHTML = `
                            <div class="flex justify-between items-center w-full">
                                <strong>${conv.userFullName || conv.userEmail}</strong>
                                ${badge}
                            </div>
                            <div class="text-muted" id="lastMsg-${conv.id}">${conv.lastMessage || 'Bắt đầu cuộc trò chuyện...'}</div>
                        `;
                    div.id = 'conv-item-' + conv.id;
                    listDiv.appendChild(div);
                });
            })
            .catch(console.error);
    }

    function openConversation(conv) {
        if (activeConvId) {
            var oldItem = document.getElementById('conv-item-' + activeConvId);
            if (oldItem) oldItem.classList.remove('active');
        }
        activeConvId = conv.id;
        activeChatEmail = conv.userEmail;

        var newItem = document.getElementById('conv-item-' + activeConvId);
        if (newItem) newItem.classList.add('active');

        document.getElementById('chatMainPlaceholder').style.display = 'none';
        // Thay vì dùng flex style trực tiếp, ta xoá class hidden
        var mainBox = document.getElementById('chatMainBox');
        mainBox.classList.remove('hidden');
        mainBox.style.display = 'flex';

        document.getElementById('activeChatHeader').textContent = (conv.userFullName || conv.userEmail);

        fetch('/api/chat/read/' + conv.id + '?isAdmin=true', { method: 'POST' });
        var badge = document.getElementById('badge-' + conv.id);
        if(badge) {
            badge.textContent = '0';
            badge.style.display = 'none';
        }

        fetch('/api/chat/history/' + conv.id)
            .then(res => res.json())
            .then(history => {
                var msgArea = document.getElementById('adminMessagesArea');
                msgArea.innerHTML = '';
                history.forEach(msg => {
                    appendAdminMessage(msg.content, msg.senderEmail === adminEmail);
                });
                scrollAdminBottom();
            });
    }

    function initAdminWebSocket() {
        var socket = new SockJS('/ws');
        stompClientAdmin = Stomp.over(socket);
        stompClientAdmin.debug = null;

        stompClientAdmin.connect({}, function (frame) {
            stompClientAdmin.subscribe('/topic/messages/' + adminEmail, function (msg) {
                var data = JSON.parse(msg.body);

                if (data.senderEmail !== adminEmail) {
                    loadConversations();
                    if (activeChatEmail === data.senderEmail) {
                        appendAdminMessage(data.content, false);
                        if (activeConvId) fetch('/api/chat/read/' + activeConvId + '?isAdmin=true', { method: 'POST' });
                    }
                }
            });
        }, function(err) {
            setTimeout(initAdminWebSocket, 5000);
        });
    }

    function sendAdminMessage() {
        var input = document.getElementById('adminInputBox');
        var content = input.value.trim();
        if (content && stompClientAdmin && activeChatEmail) {
            var msgPayload = {
                senderEmail: adminEmail,
                recipientId: activeChatEmail,
                content: content
            };
            stompClientAdmin.send("/app/chat.sendMessage", {}, JSON.stringify(msgPayload));

            appendAdminMessage(content, true);
            input.value = '';

            if (activeConvId) {
                var lastMsgDiv = document.getElementById('lastMsg-' + activeConvId);
                if(lastMsgDiv) lastMsgDiv.textContent = content;
            }
        }
    }

    function handleAdminEnter(e) {
        if (e.key === 'Enter') sendAdminMessage();
    }

    function appendAdminMessage(text, isMe) {
        var msgArea = document.getElementById('adminMessagesArea');
        var cls = isMe ? 'msg-admin' : 'msg-client';
        var el = document.createElement('div');
        el.className = 'msg-bubble ' + cls;
        el.textContent = text;
        msgArea.appendChild(el);
        scrollAdminBottom();
    }

    function scrollAdminBottom() {
        var msgArea = document.getElementById('adminMessagesArea');
        msgArea.scrollTop = msgArea.scrollHeight;
    }
</script>
</body>
</html>
